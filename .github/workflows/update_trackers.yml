name: Update Trackers

# Somente execução manual
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: |
          python update_trackers.py

      - name: Commit & push if trackers.txt changed
        run: |
          echo "Mudanças (se existirem):"
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git add trackers.txt
            # se não houver diferenças staged, git diff --staged --quiet retorna 0
            if git diff --staged --quiet; then
              echo "Sem mudanças reais a commitar."
            else
              # define o author só para este commit (não altera config global)
              git commit --author="github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" -m "Atualiza trackers.txt (automatizado) - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
              git push
              echo "Pushed changes."
            fi
          else
            echo "Nada modificado no repositório."
          fi
