name: Update Trackers

# Somente execução manual
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: |
          python update_trackers.py

      - name: Commit & push if trackers.txt changed (use PAT or derived author)
        env:
          DEPLOY_PAT: ${{ secrets.PAT }}
          COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
        run: |
          set -euo pipefail
          echo "Mudanças (se existirem):"
          git status --porcelain

          if [ -n "$(git status --porcelain)" ]; then
            git add trackers.txt

            # Se não houver diferenças staged, sai
            if git diff --staged --quiet; then
              echo "Sem mudanças reais a commitar."
              exit 0
            fi

            # Se COMMIT_NAME/COMMIT_EMAIL não fornecidos, tentar derivar com o PAT
            if [ -z "${COMMIT_NAME:-}" ] || [ -z "${COMMIT_EMAIL:-}" ]; then
              if [ -z "${DEPLOY_PAT:-}" ]; then
                echo "ERRO: COMMIT_NAME/COMMIT_EMAIL ausentes e PAT não fornecido. Aborting."
                exit 1
              fi

              echo "COMMIT_NAME/COMMIT_EMAIL não definidos — consultando GitHub API com o PAT para obter identidade..."
              user_json=$(curl -s -H "Authorization: token $DEPLOY_PAT" https://api.github.com/user)

              COMMIT_NAME=$(echo "$user_json" | python -c 'import sys,json;u=json.load(sys.stdin);print(u.get("name") or u.get("login") or "")')
              COMMIT_EMAIL=$(echo "$user_json" | python -c 'import sys,json;u=json.load(sys.stdin);print(u.get("email") or (u.get("login")+"@users.noreply.github.com") if u.get("login") else "")')

              if [ -z "$COMMIT_NAME" ] || [ -z "$COMMIT_EMAIL" ]; then
                echo "ERRO: Não foi possível derivar COMMIT_NAME/COMMIT_EMAIL da API. Aborting."
                exit 1
              fi

              echo "Usando autor derivado: $COMMIT_NAME <$COMMIT_EMAIL>"
            else
              echo "Usando author fornecido: $COMMIT_NAME <$COMMIT_EMAIL>"
            fi

            # Faz o commit definindo temporariamente user.name/user.email para evitar erro de committer unknown.
            # Também passamos --author para garantir o campo author como desejado.
            git -c user.name="$COMMIT_NAME" -c user.email="$COMMIT_EMAIL" commit --author="$COMMIT_NAME <$COMMIT_EMAIL>" -m "Atualiza trackers.txt (automatizado) - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"

            # Push autenticado usando PAT (sem expor token nos logs)
            BRANCH="$(git rev-parse --abbrev-ref HEAD)"
            git push "https://x-access-token:${DEPLOY_PAT}@github.com/${{ github.repository }}" "HEAD:${BRANCH}"
            echo "Pushed changes to ${BRANCH}."
          else
            echo "Nada modificado no repositório."
          fi
