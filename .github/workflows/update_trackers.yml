name: Update Trackers

# Somente execução manual
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: |
          python update_trackers.py

      - name: Commit & push if trackers.txt changed (use PAT)
        env:
          DEPLOY_PAT: ${{ secrets.PAT }}
          COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
        run: |
          echo "Mudanças (se existirem):"
          git status --porcelain

          if [ -n "$(git status --porcelain)" ]; then
            git add trackers.txt
            # Se não houver diferenças staged, sai
            if git diff --staged --quiet; then
              echo "Sem mudanças reais a commitar."
              exit 0
            fi

            # Faz o commit definindo o author apenas para este commit (não altera configs)
            git commit --author="$COMMIT_NAME <$COMMIT_EMAIL>" -m "Atualiza trackers.txt (automatizado) - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"

            # Push autenticado usando PAT (sem expor o token nos logs)
            # envia para o branch atual
            BRANCH="$(git rev-parse --abbrev-ref HEAD)"
            git push "https://x-access-token:${DEPLOY_PAT}@github.com/${{ github.repository }}" "HEAD:${BRANCH}"
            echo "Pushed changes to ${BRANCH}."
          else
            echo "Nada modificado no repositório."
          fi
